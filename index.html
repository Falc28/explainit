<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ExplainIt</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
    h1 { color: #333; }
    textarea { width: 80%; height: 150px; margin: 20px 0; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #output { margin-top: 20px; background: #fff; padding: 20px; border-radius: 8px; min-height: 100px; }
  </style>
</head>
<body>
  <h1>ExplainIt</h1>
<iframe src="https://huggingface.co/spaces/mayankpaul/ExplainLikeImFive?__theme=light" 
        style="width:80%; height:500px; border:1px solid #ccc; border-radius:10px;">
</iframe>
<p>Paste your text inside the HuggingFace box above and get an explanation!</p>

  <script>
    async function explainText() {
      const text = document.getElementById('userInput').value;
      const output = document.getElementById('output');
      output.innerHTML = "Processing...";

      // Free HuggingFace model for summarization/explanation
      const response = await fetch("https://api-inference.huggingface.co/models/t5-small", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ inputs: "explain: " + text })
      });

      const data = await response.json();
      if(data.error){
        output.innerHTML = "Error: " + data.error + ". Try again later!";
      } else {
        output.innerHTML = data[0].generated_text || "No response received.";
      }
    }
  </script>
</body>
</html>
