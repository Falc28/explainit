<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExplainIt</title>

  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CSS CUSTOM PROPERTIES — all colours/sizes live here
       Switch [data-theme="light"] overrides the dark defaults
    ============================================================ */
    :root {
      /* Surfaces */
      --bg:           #0d0d0f;
      --surface:      #131316;
      --surface-2:    #1a1a1f;
      --surface-3:    #222228;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);

      /* Text */
      --text-primary:   #f0ede8;
      --text-secondary: #8a8792;
      --text-muted:     #4a4856;

      /* Accent — warm amber */
      --accent:         #e8a045;
      --accent-dim:     rgba(232,160,69,0.12);
      --accent-glow:    rgba(232,160,69,0.25);

      /* Status */
      --success:  #5ecfa0;
      --error:    #e05c6a;

      /* Toolbar */
      --toolbar-w-collapsed: 56px;
      --toolbar-w-expanded:  200px;

      /* Misc */
      --radius:   12px;
      --radius-sm: 8px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --shadow:   0 8px 32px rgba(0,0,0,0.5);
    }

    /* Light theme overrides */
    [data-theme="light"] {
      --bg:           #f5f3ef;
      --surface:      #ffffff;
      --surface-2:    #f0ede8;
      --surface-3:    #e8e4de;
      --border:       rgba(0,0,0,0.08);
      --border-hover: rgba(0,0,0,0.16);
      --text-primary:   #1a1814;
      --text-secondary: #6b6560;
      --text-muted:     #a8a39d;
      --accent-dim:     rgba(232,160,69,0.1);
      --accent-glow:    rgba(232,160,69,0.2);
      --shadow:   0 8px 32px rgba(0,0,0,0.12);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* Subtle noise texture over the whole page */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ============================================================
       LEFT TOOLBAR
    ============================================================ */
    .toolbar {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--toolbar-w-collapsed);
      height: calc(100vh - 48px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 20px 0;
      overflow: hidden;
      transition:
        width var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);
      z-index: 100;
      box-shadow: var(--shadow);
      will-change: width;
    }

    /* Toolbar expands on hover */
    .toolbar:hover {
      width: var(--toolbar-w-expanded);
      border-color: var(--border-hover);
      box-shadow: var(--shadow), 0 0 0 1px var(--border-hover);
    }

    /* Logo area at the top of toolbar */
    .toolbar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px 20px;
      border-bottom: 1px solid var(--border);
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
    }

    .toolbar-logo-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-logo-icon svg { width: 14px; height: 14px; }

    .toolbar-logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text-primary);
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity var(--transition), transform var(--transition);
      letter-spacing: 0.02em;
    }

    .toolbar:hover .toolbar-logo-text {
      opacity: 1;
      transform: translateX(0);
    }

    /* Nav items group */
    .toolbar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      padding: 12px 8px;
      overflow: hidden;
    }

    /* Bottom group (settings) */
    .toolbar-bottom {
      width: 100%;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }

    /* Individual nav button */
    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      transition:
        background var(--transition),
        color var(--transition);
      position: relative;
    }

    .nav-btn:hover {
      background: var(--surface-2);
      color: var(--text-primary);
    }

    /* Active state */
    .nav-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .nav-btn.active .nav-icon {
      color: var(--accent);
    }

    /* Active left border indicator */
    .nav-btn.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      height: 60%;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition);
    }

    .nav-icon svg { width: 18px; height: 18px; }

    .nav-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity var(--transition), transform var(--transition);
      letter-spacing: 0.01em;
    }

    .toolbar:hover .nav-label {
      opacity: 1;
      transform: translateX(0);
    }

    /* ============================================================
       MAIN CONTENT AREA
    ============================================================ */
    .main {
      flex: 1;
      margin-left: calc(var(--toolbar-w-collapsed) + 24px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      transition: margin-left var(--transition);
    }

    /* ============================================================
       TABS (content panels)
    ============================================================ */
    .tab-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      animation: fadeIn 0.35s ease forwards;
    }

    .tab-panel.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       PREP TAB — idle state (just the brand mark + tagline)
    ============================================================ */
    .prep-idle {
      text-align: center;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .prep-idle.hidden {
      opacity: 0;
      transform: translateY(-20px);
      pointer-events: none;
    }

    .brand-mark {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 14px;
    }

    .tagline {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
    }

    /* "Open Prep" hero button */
    .hero-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--accent);
      color: #1a1208;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .hero-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    .hero-btn:active { transform: translateY(0); }

    /* ============================================================
       PREP TAB — active state (option bar + workspace)
    ============================================================ */
    .prep-workspace {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 0 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 20px));
    }

    .prep-workspace.visible {
      opacity: 1;
      transform: translate(-50%, -50%);
      pointer-events: all;
    }

    /* ---- Option bar ---- */
    .option-bar {
      display: flex;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px;
      box-shadow: var(--shadow);
    }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      border-radius: 50px;
      cursor: pointer;
      transition:
        background var(--transition),
        color var(--transition),
        box-shadow var(--transition);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .opt-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .opt-btn:hover {
      background: var(--surface-2);
      color: var(--text-primary);
    }

    .opt-btn.selected {
      background: var(--accent);
      color: #1a1208;
      box-shadow: 0 2px 12px var(--accent-glow);
      font-weight: 600;
    }

    /* ---- Upload area ---- */
    .upload-zone {
      width: 100%;
      border: 1.5px dashed var(--border-hover);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition:
        border-color var(--transition),
        background var(--transition);
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* Hidden actual file input */
    .upload-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 36px;
      height: 36px;
      background: var(--surface-2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background var(--transition), color var(--transition);
    }

    .upload-zone:hover .upload-icon {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .upload-label {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }

    .upload-label span {
      color: var(--accent);
      font-weight: 500;
    }

    .upload-sublabel {
      font-size: 11.5px;
      color: var(--text-muted);
    }

    /* File chips */
    .file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      margin-top: 4px;
      min-height: 0;
    }

    .file-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 12px;
      color: var(--text-secondary);
      animation: chipIn 0.2s ease forwards;
    }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .file-chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 0;
      margin-left: 2px;
      border-radius: 50%;
      transition: color 0.15s;
    }

    .file-chip-remove:hover { color: var(--error); }
    .file-chip-remove svg { width: 12px; height: 12px; }

    /* ---- Prompt textarea ---- */
    .prompt-wrap {
      width: 100%;
      position: relative;
    }

    .prompt-box {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 52px 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      resize: none;
      outline: none;
      min-height: 90px;
      line-height: 1.6;
      transition:
        border-color var(--transition),
        box-shadow var(--transition);
      overflow-y: auto;
    }

    .prompt-box::placeholder { color: var(--text-muted); }

    .prompt-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    /* Run button inside prompt box */
    .run-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 36px;
      height: 36px;
      background: var(--accent);
      color: #1a1208;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        opacity 0.2s ease;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .run-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .run-btn:active { transform: scale(0.96); }

    .run-btn svg { width: 16px; height: 16px; }

    .run-btn.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* Spinner inside run button when loading */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(26,18,8,0.3);
      border-top-color: #1a1208;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Result area ---- */
    .result-area {
      width: 100%;
      max-height: 340px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-primary);
      display: none;
      scroll-behavior: smooth;
      animation: fadeIn 0.3s ease;
    }

    .result-area.visible { display: block; }

    /* Scrollbar styling */
    .result-area::-webkit-scrollbar { width: 4px; }
    .result-area::-webkit-scrollbar-track { background: transparent; }
    .result-area::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

    /* Result content formatting */
    .result-area h3 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .result-area p { margin-bottom: 10px; }
    .result-area ul, .result-area ol { padding-left: 20px; margin-bottom: 10px; }
    .result-area li { margin-bottom: 6px; }

    /* Flash card styles */
    .flashcard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .flashcard {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
    }

    .flashcard:hover { border-color: var(--border-hover); }

    .flashcard.flipped { background: var(--accent-dim); border-color: var(--accent); }

    .flashcard-q {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: 10px;
    }

    .flashcard-content {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-primary);
    }

    .flashcard-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .flashcard-answer {
      display: none;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .flashcard.flipped .flashcard-answer { display: block; }
    .flashcard.flipped .flashcard-hint { display: none; }

    /* Error state */
    .result-error {
      color: var(--error);
      font-size: 13px;
    }

    /* ============================================================
       SETTINGS TAB
    ============================================================ */
    .settings-panel {
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
    }

    .settings-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .settings-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }

    .settings-row:last-child { border-bottom: none; }
    .settings-row:hover { background: var(--surface-2); }

    .settings-row-info {}

    .settings-row-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .settings-row-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Toggle switch */
    .toggle-wrap {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--surface-3);
      border-radius: 50px;
      cursor: pointer;
      transition: background var(--transition);
      border: 1px solid var(--border);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform var(--transition), background var(--transition);
    }

    .toggle-input:checked + .toggle-slider {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .toggle-input:checked + .toggle-slider::before {
      transform: translate(20px, -50%);
      background: var(--accent);
    }

    /* ============================================================
       EMPTY / PLACEHOLDER STATES
    ============================================================ */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ============================================================
       TOAST NOTIFICATIONS
    ============================================================ */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      white-space: nowrap;
    }

    .toast.error { border-color: var(--error); color: var(--error); }
    .toast.success { border-color: var(--success); color: var(--success); }

    @keyframes toastIn  { from { opacity: 0; transform: translateY(12px); } to   { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to   { opacity: 0; } }

    /* ============================================================
       RESPONSIVE — shrink main on very small screens
    ============================================================ */
    @media (max-width: 600px) {
      .main { margin-left: calc(var(--toolbar-w-collapsed) + 12px); }
      .flashcard-grid { grid-template-columns: 1fr; }
      .option-bar { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       LEFT TOOLBAR
  ============================================================ -->
  <aside class="toolbar" id="toolbar">

    <!-- Logo mark -->

  <!-- Toast container (for brief notification messages) -->

  <!-- ============================================================
       JAVASCRIPT
  ============================================================ -->
  <script>
    /* ============================================================
       STATE — all mutable UI state lives here
    ============================================================ */
    const state = {
      mode: null,           // 'flashcards' | 'summarize' | 'simplify'
      files: [],            // Array of File objects (max 5)
      isLoading: false,
      workspaceOpen: false,
    };

    /* ============================================================
       TAB SWITCHING
       Called by every nav-btn click to show/hide panels.
    ============================================================ */
    function switchTab(tabId) {
      // Update panel visibility
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');

      // Update nav button active state
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const navBtn = document.getElementById('nav-' + tabId);
      if (navBtn) navBtn.classList.add('active');
    }

    /* ============================================================
       PREP WORKSPACE — open from landing state
    ============================================================ */
    function openPrepWorkspace() {
      if (state.workspaceOpen) return;
      state.workspaceOpen = true;

      // Hide idle brand mark with a fade-out
      const idle = document.getElementById('prep-idle');
      idle.classList.add('hidden');

      // Show workspace after a brief delay (feels intentional)
      setTimeout(() => {
        idle.style.display = 'none';
        document.getElementById('prep-workspace').classList.add('visible');
      }, 350);
    }

    /* ============================================================
       OPTION SELECTION (Flash Cards / Summarize / Simplify)
    ============================================================ */
    function selectMode(mode) {
      state.mode = mode;

      // Highlight the selected button
      document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('opt-' + mode).classList.add('selected');

      // Clear previous results when switching mode
      const resultArea = document.getElementById('result-area');
      resultArea.classList.remove('visible');
      resultArea.innerHTML = '';
    }

    /* ============================================================
       FILE HANDLING
    ============================================================ */

    // Triggered by clicking the upload zone (file input onChange)
    function handleFileSelect(event) {
      addFiles(Array.from(event.target.files));
      // Reset input so the same file can be re-added after removal
      event.target.value = '';
    }

    // Drag-and-drop support
    function handleDragOver(event) {
      event.preventDefault();
      document.getElementById('upload-zone').classList.add('drag-over');
    }

    function handleDragLeave(event) {
      document.getElementById('upload-zone').classList.remove('drag-over');
    }

    function handleDrop(event) {
      event.preventDefault();
      document.getElementById('upload-zone').classList.remove('drag-over');
      addFiles(Array.from(event.dataTransfer.files));
    }

    // Add files to state.files (enforce 5 file max)
    function addFiles(incoming) {
      const remaining = 5 - state.files.length;
      if (remaining <= 0) {
        showToast('Maximum 5 files allowed.', 'error');
        return;
      }
      const toAdd = incoming.slice(0, remaining);
      if (incoming.length > remaining) {
        showToast(`Only ${remaining} more file(s) can be added.`, 'error');
      }
      state.files.push(...toAdd);
      renderFileChips();
    }

    // Remove a file by index
    function removeFile(index) {
      state.files.splice(index, 1);
      renderFileChips();
    }

    // Re-render the file chip list from state.files
    function renderFileChips() {
      const container = document.getElementById('file-chips');
      container.innerHTML = '';

      state.files.forEach((file, i) => {
        const chip = document.createElement('div');
        chip.className = 'file-chip';
        chip.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          ${escapeHtml(truncate(file.name, 26))}
          <button class="file-chip-remove" onclick="removeFile(${i})" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        `;
        container.appendChild(chip);
      });
    }

    /* ============================================================
       RUN QUERY — reads files, builds prompt, calls Anthropic API
    ============================================================ */

    // Allow Cmd/Ctrl+Enter to trigger run
    function handlePromptKey(event) {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
        event.preventDefault();
        runQuery();
      }
    }

    async function runQuery() {
      if (state.isLoading) return;

      // Validation: must have a mode selected
      if (!state.mode) {
        showToast('Please select Flash Cards, Summarize, or Simplify first.', 'error');
        return;
      }

      // At least a file or some prompt text is required
      const promptText = document.getElementById('prompt-box').value.trim();
      if (state.files.length === 0 && !promptText) {
        showToast('Add a file or type something in the prompt box.', 'error');
        return;
      }

      setLoading(true);

      try {
        // Step 1: Read all files into base64 / text
        const fileContents = await readAllFiles(state.files);

        // Step 2: Build the system + user messages for Claude
        const { systemPrompt, userMessage } = buildMessages(state.mode, fileContents, promptText);

        // Step 3: Call the Anthropic API
        const rawText = await callClaude(systemPrompt, userMessage);

        // Step 4: Render the result
        renderResult(state.mode, rawText);

      } catch (err) {
        console.error('ExplainIt error:', err);
        showResult(`<p class="result-error">⚠ Something went wrong: ${escapeHtml(err.message)}</p>`);
      } finally {
        setLoading(false);
      }
    }

    /* ---- Read files as text or base64 ---- */
    async function readAllFiles(files) {
      const results = [];

      for (const file of files) {
        const isText = /text|json|markdown|plain/i.test(file.type) || /\.(txt|md|csv)$/i.test(file.name);
        const isPdf  = file.type === 'application/pdf' || file.name.endsWith('.pdf');
        const isImg  = /image\//i.test(file.type);

        if (isText) {
          // Read as plain text
          const text = await readAsText(file);
          results.push({ name: file.name, type: 'text', content: text });
        } else if (isPdf || isImg) {
          // Read as base64 for Claude's document/image input
          const b64 = await readAsBase64(file);
          results.push({ name: file.name, type: isPdf ? 'pdf' : 'image', mediaType: file.type || 'image/jpeg', content: b64 });
        } else {
          // For other types (docx etc.), try reading as text
          try {
            const text = await readAsText(file);
            results.push({ name: file.name, type: 'text', content: text });
          } catch {
            results.push({ name: file.name, type: 'unsupported', content: '' });
          }
        }
      }

      return results;
    }

    function readAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error('Could not read ' + file.name));
        reader.readAsText(file);
      });
    }

    function readAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result.split(',')[1]); // strip data-url prefix
        reader.onerror = () => reject(new Error('Could not read ' + file.name));
        reader.readAsDataURL(file);
      });
    }

    /* ---- Build system + user prompts per mode ---- */
    function buildMessages(mode, fileContents, promptText) {
      // System prompt tells Claude exactly what to produce
      const systemPrompts = {
        flashcards: `You are an expert study assistant. Extract the most important concepts, 
facts, and ideas from the provided content and create smart flash cards. 
Ignore filler content, headers, and irrelevant text.

Return ONLY valid JSON — an array of objects with keys "question" and "answer".
Example: [{"question":"What is photosynthesis?","answer":"The process plants use to convert sunlight into energy."}]
Aim for 6–12 cards. No extra text outside the JSON.`,

        summarize: `You are an expert at creating clear, well-structured study notes. 
Summarise the provided content using bullet points and sub-bullet points.
Format the output as clean HTML using <h3> for main topics, <ul> and <li> for bullet points.
Preserve key numbers, dates, and technical terms. Be concise but complete.
Return only the HTML fragment — no <!DOCTYPE> or <html> wrapper.`,

        simplify: `You are a master teacher who explains complex topics to a 5-year-old. 
Start from the very basics — assume the reader knows nothing. 
Use simple words, short sentences, and helpful analogies. 
Be warm, encouraging, and thorough enough that the reader fully understands.
Format output as clean HTML: <h3> for section headings, <p> for paragraphs.
Return only the HTML fragment.`,
      };

      // Build the content array for the user message (supports multi-modal)
      const contentParts = [];

      // Attach file content
      fileContents.forEach(fc => {
        if (fc.type === 'text') {
          contentParts.push({
            type: 'text',
            text: `--- FILE: ${fc.name} ---\n${fc.content}\n--- END OF FILE ---`,
          });
        } else if (fc.type === 'pdf') {
          contentParts.push({
            type: 'document',
            source: { type: 'base64', media_type: 'application/pdf', data: fc.content },
          });
        } else if (fc.type === 'image') {
          contentParts.push({
            type: 'image',
            source: { type: 'base64', media_type: fc.mediaType, data: fc.content },
          });
        }
      });

      // Append user's extra prompt/instructions if provided
      if (promptText) {
        contentParts.push({ type: 'text', text: `\nAdditional instructions / context:\n${promptText}` });
      }

      // If only a prompt with no files, still needs something to summarize
      if (fileContents.length === 0 && promptText) {
        contentParts.push({ type: 'text', text: `\nContent to process:\n${promptText}` });
      }

      return {
        systemPrompt: systemPrompts[mode],
        userMessage: contentParts,
      };
    }

    /* ---- Call Claude via Anthropic API ---- */
    async function callClaude(systemPrompt, contentParts) {
      const response = await fetch('https://explainit-proxy.vansh-fnbs.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: contentParts }],
        }),
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      // Extract text from the first text block in the response
      return data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    }

    /* ============================================================
       RESULT RENDERING — parses API output and displays it
    ============================================================ */
    function renderResult(mode, rawText) {
      if (mode === 'flashcards') {
        renderFlashCards(rawText);
      } else {
        // Summarize / Simplify return HTML directly
        showResult(rawText);
      }
    }

    function renderFlashCards(jsonText) {
      let cards;
      try {
        // Strip any accidental markdown code fences
        const clean = jsonText.replace(/```json|```/g, '').trim();
        cards = JSON.parse(clean);
      } catch {
        showResult('<p class="result-error">⚠ Could not parse flash cards. Try again.</p>');
        return;
      }

      if (!Array.isArray(cards) || cards.length === 0) {
        showResult('<p class="result-error">⚠ No flash cards were generated.</p>');
        return;
      }

      let html = `<h3>Flash Cards <span style="font-weight:400;color:var(--text-muted);font-family:'DM Sans';font-size:12px">(tap to reveal answer)</span></h3>`;
      html += '<div class="flashcard-grid">';

      cards.forEach((card, i) => {
        html += `
          <div class="flashcard" id="card-${i}" onclick="flipCard(${i})">
            <div class="flashcard-q">Question ${i + 1}</div>
            <div class="flashcard-content">${escapeHtml(card.question)}</div>
            <div class="flashcard-hint">Tap to reveal answer</div>
            <div class="flashcard-answer">${escapeHtml(card.answer)}</div>
          </div>
        `;
      });

      html += '</div>';
      showResult(html);
    }

    // Flip a flash card between question and answer
    function flipCard(index) {
      document.getElementById('card-' + index).classList.toggle('flipped');
    }

    // Show the result area with given HTML
    function showResult(html) {
      const area = document.getElementById('result-area');
      area.innerHTML = html;
      area.classList.add('visible');
      area.scrollTop = 0;
    }

    /* ============================================================
       LOADING STATE
    ============================================================ */
    function setLoading(on) {
      state.isLoading = on;
      const btn = document.getElementById('run-btn');

      if (on) {
        btn.classList.add('loading');
        btn.innerHTML = '<div class="spinner"></div>';
      } else {
        btn.classList.remove('loading');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        `;
      }
    }

    /* ============================================================
       SETTINGS — THEME TOGGLE
    ============================================================ */
    function toggleTheme() {
      const isLight = document.getElementById('theme-toggle').checked;
      document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
    }

    /* ============================================================
       TOAST NOTIFICATIONS
    ============================================================ */
    function showToast(message, type = '') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      // Auto-remove after animation completes (3s)
      setTimeout(() => toast.remove(), 3050);
    }

    /* ============================================================
       UTILITY HELPERS
    ============================================================ */

    // Prevent XSS by escaping HTML special characters
    function escapeHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Truncate long file names for chips
    function truncate(str, max) {
      return str.length > max ? str.slice(0, max - 1) + '…' : str;
    }
  </script>
</body>
